name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Generate preview assets
        shell: bash
        run: go run ./cmd/importsheet
      - name: Build download zip
        shell: bash
        run: |
          mkdir -p docs/download dist
          APP_VERSION="pages-${GITHUB_SHA::7}"
          GOOS=windows GOARCH=amd64 go build -buildvcs=false -ldflags="-H=windowsgui -s -w -X main.appVersion=${APP_VERSION}" -o dist/DeguDesktop.exe ./cmd/degu
          cp README.md dist/README.md
          (cd dist && zip -q DeguDesktop-windows-amd64.zip DeguDesktop.exe README.md)
          cp dist/DeguDesktop-windows-amd64.zip docs/download/DeguDesktop-windows-amd64.zip
          rm -f dist/DeguDesktop.exe
          GOOS=windows GOARCH=386 go build -buildvcs=false -ldflags="-H=windowsgui -s -w -X main.appVersion=${APP_VERSION}" -o dist/DeguDesktop.exe ./cmd/degu
          (cd dist && zip -q DeguDesktop-windows-386.zip DeguDesktop.exe README.md)
          cp dist/DeguDesktop-windows-386.zip docs/download/DeguDesktop-windows-386.zip
      - name: Stamp page build metadata
        shell: bash
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          import os
          import re

          sha = os.environ["GITHUB_SHA"]
          values = {
              "data-build-version": f"pages-{sha[:7]}",
              "data-build-date": datetime.now(timezone(timedelta(hours=9))).strftime("%Y-%m-%d"),
              "data-build-commit": sha[:7],
          }
          path = Path("docs/index.html")
          text = path.read_text(encoding="utf-8")
          for attr, value in values.items():
              text, count = re.subn(
                  rf"(<strong {attr}>).*?(</strong>)",
                  rf"\g<1>{value}\2",
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"Missing {attr} in docs/index.html")
          path.write_text(text, encoding="utf-8")
          PY
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
