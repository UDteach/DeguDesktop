name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
      AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Generate assets
        shell: pwsh
        run: go run ./cmd/importsheet
      - name: Test
        run: go test -buildvcs=false ./...
      - name: Build
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = "${{ github.ref_name }}"
          $baseVersion = ($version -replace '^[vV]', '') -split '[+-]' | Select-Object -First 1
          $parts = @($baseVersion -split '\.')
          $numericVersion = (($parts + @("0", "0", "0", "0")) | Select-Object -First 4) -join "."
          go run ./cmd/winresicon -src docs/assets/degu-preview.png -out winres/icon.png
          if ($LASTEXITCODE -ne 0) { throw "winresicon failed" }
          $winres = Get-Content winres/winres.json -Raw | ConvertFrom-Json
          $winres.RT_MANIFEST.'#1'.'0409'.identity.version = $numericVersion
          $winres.RT_VERSION.'#1'.'0000'.fixed.file_version = $numericVersion
          $winres.RT_VERSION.'#1'.'0000'.fixed.product_version = $numericVersion
          $winres.RT_VERSION.'#1'.'0000'.info.'0409'.FileVersion = $version
          $winres.RT_VERSION.'#1'.'0000'.info.'0409'.ProductVersion = $version
          $winresJson = $winres | ConvertTo-Json -Depth 20
          [System.IO.File]::WriteAllText((Resolve-Path winres/winres.json).Path, $winresJson, (New-Object System.Text.UTF8Encoding $false))
          go run github.com/tc-hib/go-winres@v0.3.1 make --arch amd64,386 --out cmd/degu/rsrc --file-version $version --product-version $version
          if ($LASTEXITCODE -ne 0) { throw "go-winres failed" }

          $useArtifactSigning = $env:AZURE_CLIENT_ID -and $env:AZURE_TENANT_ID -and $env:AZURE_SUBSCRIPTION_ID -and $env:AZURE_ARTIFACT_SIGNING_ENDPOINT -and $env:AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME -and $env:AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME
          $certPath = ""
          if (-not $useArtifactSigning -and $env:WINDOWS_CERTIFICATE_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP "degudesktop-signing.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          }
          function Sign-IfConfigured {
            param([string]$Path)
            if ($useArtifactSigning) {
              Write-Host "Artifact Signing is configured; deferring signing for $Path."
              return
            }
            if (-not $certPath) {
              Write-Host "Signing certificate not configured; leaving $Path unsigned."
              return
            }
            $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
            if (-not $signtool) {
              throw "signtool.exe was not found, but signing secrets are configured."
            }
            & $signtool.Source sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $Path
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $Path"
            }
            Get-AuthenticodeSignature -FilePath $Path | Format-List Status,SignerCertificate
          }

          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -buildvcs=false -ldflags="-H=windowsgui -X main.appVersion=$version" -o dist/DeguDesktop-windows-amd64.exe ./cmd/degu
          Sign-IfConfigured dist/DeguDesktop-windows-amd64.exe
          $env:GOARCH = "386"
          go build -buildvcs=false -ldflags="-H=windowsgui -X main.appVersion=$version" -o dist/DeguDesktop-windows-386.exe ./cmd/degu
          Sign-IfConfigured dist/DeguDesktop-windows-386.exe
      - name: Azure login for Artifact Signing
        if: env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && env.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Sign with Azure Artifact Signing
        if: env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && env.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\dist\DeguDesktop-windows-amd64.exe
            ${{ github.workspace }}\dist\DeguDesktop-windows-386.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Degu Desktop
          description-url: https://github.com/UDteach/DeguDesktop
      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $repoUrl = "https://github.com/UDteach/DeguDesktop"
          $releaseUrl = "$repoUrl/releases/tag/$version"
          Get-AuthenticodeSignature -FilePath dist/DeguDesktop-windows-amd64.exe,dist/DeguDesktop-windows-386.exe |
            Select-Object Path,Status,SignerCertificate |
            Format-List
          $amd64ExeHash = (Get-FileHash -Algorithm SHA256 dist/DeguDesktop-windows-amd64.exe).Hash
          $x86ExeHash = (Get-FileHash -Algorithm SHA256 dist/DeguDesktop-windows-386.exe).Hash
          function Write-SecurityFile {
            param(
              [string]$Path,
              [string]$Arch,
              [string]$ZipName,
              [string]$ExeHash
            )
            @"
          Degu Desktop Windows release security notes

          Version: $version
          Architecture: $Arch
          Package file: $ZipName
          Executable: DeguDesktop.exe
          Executable SHA256: $ExeHash
          Source repository: $repoUrl
          Release page: $releaseUrl

          Expected behavior:
          - Windows taskbar desktop pet app.
          - Runs as the current user; no admin manifest/elevation request.
          - Update check is user-triggered from the tray or Updates settings tab.
          - Updater downloads GitHub release ZIPs and verifies GitHub-provided size and sha256 digest when present.
          - Updater does not write or launch PowerShell scripts.

          If Microsoft Defender SmartScreen, Microsoft Defender, or McAfee flags this build:
          - Verify the SHA256 above against the release SHA256SUMS.txt file.
          - Submit the exact ZIP/EXE as a false positive to Microsoft Security Intelligence or McAfee Dispute Detection & Allowlisting.
          "@ | Set-Content -Path $Path -Encoding ascii
          }
          New-Item -ItemType Directory -Force dist/package-amd64,dist/package-386 | Out-Null
          Copy-Item dist/DeguDesktop-windows-amd64.exe dist/package-amd64/DeguDesktop.exe
          Copy-Item README.md dist/package-amd64/README.md
          Write-SecurityFile -Path dist/package-amd64/SECURITY.txt -Arch "windows-amd64" -ZipName "DeguDesktop-windows-amd64.zip" -ExeHash $amd64ExeHash
          Copy-Item dist/DeguDesktop-windows-386.exe dist/package-386/DeguDesktop.exe
          Copy-Item README.md dist/package-386/README.md
          Write-SecurityFile -Path dist/package-386/SECURITY.txt -Arch "windows-386" -ZipName "DeguDesktop-windows-386.zip" -ExeHash $x86ExeHash
          Compress-Archive -Path dist/package-amd64/DeguDesktop.exe,dist/package-amd64/README.md,dist/package-amd64/SECURITY.txt -DestinationPath dist/DeguDesktop-windows-amd64.zip -Force
          Compress-Archive -Path dist/package-386/DeguDesktop.exe,dist/package-386/README.md,dist/package-386/SECURITY.txt -DestinationPath dist/DeguDesktop-windows-386.zip -Force
          $sumLines = Get-FileHash -Algorithm SHA256 dist/DeguDesktop-windows-amd64.zip,dist/DeguDesktop-windows-386.zip |
            ForEach-Object { "$($_.Hash)  $(Split-Path -Leaf $_.Path)" }
          $sumLines += "$amd64ExeHash  DeguDesktop-windows-amd64.zip/DeguDesktop.exe"
          $sumLines += "$x86ExeHash  DeguDesktop-windows-386.zip/DeguDesktop.exe"
          $sumLines | Set-Content -Path dist/SHA256SUMS.txt -Encoding ascii
      - name: Prepare release notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $notesPath = "docs/releases/$version.md"
          New-Item -ItemType Directory -Force dist | Out-Null
          if (Test-Path $notesPath) {
            Copy-Item $notesPath dist/RELEASE_NOTES.md
          } else {
            @"
          # DeguDesktop $version

          See the release assets and SHA256SUMS.txt for downloadable packages and verification hashes.
          "@ | Set-Content -Path dist/RELEASE_NOTES.md -Encoding utf8
          }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.md
          overwrite_files: true
          files: |
            dist/DeguDesktop-windows-amd64.zip
            dist/DeguDesktop-windows-386.zip
            dist/SHA256SUMS.txt
